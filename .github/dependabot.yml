version: 2
updates:
  # Cargo (Rust) — workspace at repo root
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    ignore:
      # `wide` 0.7 -> 1.x is a SIMD-API-breaking major that touches the
      # histogram/leaf hot paths (core/simd.rs, core/linear_histogram.rs,
      # backend_cpu/{lib,pl_histogram}.rs) and needs a dedicated,
      # benchmarked migration PR rather than an auto-bump.  Tracked in
      # https://github.com/LGA-Personal/AlloyGBM/issues/59 — drop this
      # ignore once that migration lands.
      - dependency-name: "wide"
        update-types: ["version-update:semver-major"]
    groups:
      # Group patch/minor dep bumps so the PR count stays sane.  Majors
      # still come in as individual PRs since they often require code
      # changes.
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python build / dev dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
