name: Feature request
description: Propose a new feature, parameter, or behavior change.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check the
        [roadmap](https://github.com/LGA-Personal/AlloyGBM/blob/main/docs/roadmap/current.md)
        and [limitations](https://github.com/LGA-Personal/AlloyGBM/blob/main/docs/limitations.md)
        to see if this is already planned or explicitly out of scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the user-facing pain. "I want LightGBM-style interaction
        constraints" is a solution; "When I train on grouped features I
        can't prevent splits from mixing groups within a tree path" is a
        problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: |
        If you have a concrete API in mind, sketch it. Otherwise describe
        the desired behavior in prose.
      render: python
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other libraries / approaches you've tried or considered.
  - type: textarea
    id: extra
    attributes:
      label: Additional context
