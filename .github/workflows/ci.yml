name: CI

on:
  pull_request:
  push:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo doc
        run: cargo doc --workspace --no-deps

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test --workspace

  python-smoke:
    name: Python smoke (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy

      - name: Install build tooling
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --manifest-path bindings/python/Cargo.toml --release --interpreter python --out dist

      - name: Install wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Import smoke
        run: python -c "import alloygbm; print(alloygbm.native_runtime_info())"

      - name: Python regressor contract smoke
        run: |
          python - <<'PY'
          from alloygbm import GBMRegressor

          model = GBMRegressor(
              learning_rate=0.2,
              max_depth=4,
              seed=1,
              deterministic=True,
          )
          params = model.get_params()
          assert params["learning_rate"] == 0.2
          assert params["max_depth"] == 4

          try:
              model.set_params(learning_rate=0.0)
          except ValueError:
              pass
          else:
              raise AssertionError(
                  "expected ValueError for invalid learning_rate"
              )

          print("GBMRegressor contract smoke ok")
          PY
