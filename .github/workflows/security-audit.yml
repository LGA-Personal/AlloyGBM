name: Security audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/security-audit.yml"
  schedule:
    # Run every Monday at 09:00 UTC so RUSTSEC advisories published
    # against AlloyGBM's deps surface as a CI failure within a week
    # rather than waiting for the next user-driven change.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # `actions: write` lets the audit action open / update issues on the
  # repository describing new advisories — comment out if you don't
  # want automated issues.
  issues: write

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # No ignored advisories.  v0.7.3 cleared RUSTSEC-2025-0020 by
          # upgrading pyo3 0.23 → 0.24.  Any future RUSTSEC bisection
          # should be either fixed up front or added back here with a
          # tracking comment that mirrors the same ignore in
          # `deny.toml`.

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `bans` catches duplicate / banned dependencies.
          # `licenses` enforces the license allowlist in deny.toml.
          # `advisories` cross-checks RustSec like cargo-audit.
          # `sources` rejects deps from non-allowed registries.
          command: check bans licenses advisories sources
