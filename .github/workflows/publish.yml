name: Publish Python Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            interpreter: python3.11
            artifact_name: wheel-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
            interpreter: python3.11
            artifact_name: wheel-macos-arm64
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --manifest-path bindings/python/Cargo.toml --out dist --interpreter ${{ matrix.interpreter }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        # Pin maturin to the same major series declared in pyproject.toml's
        # build-system.requires so sdist builds don't silently pick up a
        # maturin major bump between releases.
        run: python -m pip install --upgrade pip "maturin>=1.7,<2.0"

      - name: Build source distribution
        run: maturin sdist --manifest-path bindings/python/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test-wheels:
    name: Smoke test wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: wheel-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            artifact_name: wheel-macos-arm64
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download wheel artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Install wheel
        run: python -m pip install --upgrade pip && python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test installed package
        run: |
          python - <<'PY'
          import alloygbm
          from alloygbm import GBMRegressor, GBMClassifier, GBMRanker
          from alloygbm import purged_time_series_splits, rmse, accuracy

          print(alloygbm.native_runtime_info())

          # Regression smoke
          model = GBMRegressor(
              learning_rate=0.1,
              max_depth=4,
              n_estimators=50,
              deterministic=True,
              seed=7,
          )
          rows = [[0.0, 0.0], [1.0, 0.0], [2.0, 0.0], [3.0, 0.0]]
          targets = [0.0, 1.0, 2.0, 3.0]
          model.fit(rows, targets)
          predictions = model.predict([[1.5, 0.0], [2.5, 0.0]])
          print("regressor predictions:", predictions)
          print("rmse:", rmse([1.5, 2.5], predictions))
          print("splits:", purged_time_series_splits([0, 0, 1, 1], n_splits=2))

          # Classification smoke
          clf = GBMClassifier(
              learning_rate=0.1,
              max_depth=4,
              n_estimators=20,
              deterministic=True,
              seed=7,
          )
          clf.fit(rows, [0, 0, 1, 1])
          labels = clf.predict(rows)
          probas = clf.predict_proba(rows)
          print("classifier labels:", labels)
          print("classifier probas shape:", probas.shape)

          # Multi-class classification smoke
          import numpy as np
          X_mc = np.random.RandomState(42).randn(90, 3).astype(np.float32)
          y_mc = np.repeat([0, 1, 2], 30).astype(np.float32)
          mc_clf = GBMClassifier(n_estimators=20, seed=1, deterministic=True)
          mc_clf.fit(X_mc, y_mc)
          mc_probas = mc_clf.predict_proba(X_mc)
          assert mc_probas.shape == (90, 3)
          assert np.allclose(mc_probas.sum(axis=1), 1.0, atol=1e-5)
          print("multiclass probas shape:", mc_probas.shape)

          # Ranker smoke
          rnk = GBMRanker(
              ranking_objective="rank:ndcg",
              learning_rate=0.1,
              max_depth=4,
              n_estimators=20,
              deterministic=True,
              seed=7,
          )
          rnk.fit(rows, [0, 1, 2, 3], group=[0, 0, 1, 1])
          scores = rnk.predict(rows)
          print("ranker scores:", scores)

          # Custom objective smoke
          def custom_mse(y_true, y_pred):
              grad = y_pred - y_true
              hess = np.ones_like(y_true)
              return grad, hess

          custom_reg = GBMRegressor(
              objective=custom_mse,
              n_estimators=20,
              seed=1,
              deterministic=True,
          )
          custom_reg.fit(rows, targets)
          custom_preds = custom_reg.predict([[1.5, 0.0], [2.5, 0.0]])
          print("custom objective predictions:", custom_preds)

          # Custom metric smoke
          def custom_rmse_metric(y_true, y_pred):
              return ("custom_rmse", float(np.sqrt(np.mean((y_true - y_pred) ** 2))), False)

          metric_reg = GBMRegressor(
              n_estimators=20,
              early_stopping_rounds=5,
              seed=1,
              deterministic=True,
          )
          metric_reg.fit(
              rows, targets,
              eval_set=([[1.5, 0.0], [2.5, 0.0]], [1.5, 2.5]),
              eval_metric=custom_rmse_metric,
          )
          assert metric_reg.evals_result_ is not None
          assert "custom_rmse" in metric_reg.evals_result_["validation"]
          print("custom metric values:", metric_reg.evals_result_["validation"]["custom_rmse"][:3])

          # Native categorical split smoke
          rng = np.random.RandomState(42)
          cat_X = np.column_stack([np.arange(100) % 4, rng.randn(100)]).astype(np.float32)
          cat_y = np.array([1.0 if i % 4 < 2 else 3.0 for i in range(100)], dtype=np.float32)
          cats = [["a", "b", "c", "d"][i % 4] for i in range(100)]
          cat_reg = GBMRegressor(n_estimators=10, max_cat_threshold=64, categorical_feature_indices=[0])
          cat_reg.fit(cat_X, cat_y, categorical_feature_values_list=[cats])
          cat_preds = cat_reg.predict(cat_X[:4])
          assert len(cat_preds) == 4
          assert cat_reg._native_cat_mappings_ is not None
          print("native categorical split predictions:", cat_preds)

          print("All smoke tests passed")
          PY

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, smoke-test-wheels]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/alloygbm/
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v8
        with:
          name: sdist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
