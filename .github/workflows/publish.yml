name: Publish Python Package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"
            interpreter: python3.11
            artifact_name: wheel-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            manylinux: ""
            interpreter: python3.11
            artifact_name: wheel-macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --manifest-path bindings/python/Cargo.toml --out dist --interpreter ${{ matrix.interpreter }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip maturin

      - name: Build source distribution
        run: maturin sdist --manifest-path bindings/python/Cargo.toml --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  smoke-test-wheels:
    name: Smoke test wheel (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: build-wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: wheel-linux-x86_64
          - name: macos-arm64
            os: macos-latest
            artifact_name: wheel-macos-arm64
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Install wheel
        run: python -m pip install --upgrade pip && python -m pip install --force-reinstall dist/*.whl

      - name: Smoke test installed package
        run: |
          python - <<'PY'
          import alloygbm
          from alloygbm import GBMRegressor, GBMClassifier, GBMRanker
          from alloygbm import purged_time_series_splits, rmse, accuracy

          print(alloygbm.native_runtime_info())

          # Regression smoke
          model = GBMRegressor(
              learning_rate=0.1,
              max_depth=4,
              n_estimators=50,
              deterministic=True,
              seed=7,
          )
          rows = [[0.0, 0.0], [1.0, 0.0], [2.0, 0.0], [3.0, 0.0]]
          targets = [0.0, 1.0, 2.0, 3.0]
          model.fit(rows, targets)
          predictions = model.predict([[1.5, 0.0], [2.5, 0.0]])
          print("regressor predictions:", predictions)
          print("rmse:", rmse([1.5, 2.5], predictions))
          print("splits:", purged_time_series_splits([0, 0, 1, 1], n_splits=2))

          # Classification smoke
          clf = GBMClassifier(
              learning_rate=0.1,
              max_depth=4,
              n_estimators=20,
              deterministic=True,
              seed=7,
          )
          clf.fit(rows, [0, 0, 1, 1])
          labels = clf.predict(rows)
          probas = clf.predict_proba(rows)
          print("classifier labels:", labels)
          print("classifier probas shape:", probas.shape)

          # Multi-class classification smoke
          import numpy as np
          X_mc = np.random.RandomState(42).randn(90, 3).astype(np.float32)
          y_mc = np.repeat([0, 1, 2], 30).astype(np.float32)
          mc_clf = GBMClassifier(n_estimators=20, seed=1, deterministic=True)
          mc_clf.fit(X_mc, y_mc)
          mc_probas = mc_clf.predict_proba(X_mc)
          assert mc_probas.shape == (90, 3)
          assert np.allclose(mc_probas.sum(axis=1), 1.0, atol=1e-5)
          print("multiclass probas shape:", mc_probas.shape)

          # Ranker smoke
          rnk = GBMRanker(
              ranking_objective="rank:ndcg",
              learning_rate=0.1,
              max_depth=4,
              n_estimators=20,
              deterministic=True,
              seed=7,
          )
          rnk.fit(rows, [0, 1, 2, 3], group=[0, 0, 1, 1])
          scores = rnk.predict(rows)
          print("ranker scores:", scores)

          print("All smoke tests passed")
          PY

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist, smoke-test-wheels]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/alloygbm/
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
