name: panel_time_series
version: 1
kind: uci_download
description: Time-series benchmark derived from UCI Air Quality.
source:
  dataset: air-quality
  url: https://archive.ics.uci.edu/ml/machine-learning-databases/00360/AirQualityUCI.zip
raw:
  filename: AirQualityUCI.zip
  delimiter: ";"
prepared:
  filename: prepared.csv
  target: target_co_gt
  note: Uses leakage-safe next-timestep CO target with current-timestep sensor features; adds group_id and normalized timestamp and drops rows with missing sentinel values.
